# Run Supabase migrations automatically on push to main.
# Applies ALL .sql files in supabase/migrations/ in order (Bank, Attendance, Payroll, etc.).
# One-time: Add repo secrets SUPABASE_ACCESS_TOKEN and SUPABASE_PROJECT_REF (see README).

name: Supabase migrations

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check secrets
        run: |
          if [ -z "${{ secrets.SUPABASE_ACCESS_TOKEN }}" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN is not set. Add it in repo Settings → Secrets and variables → Actions."
            exit 1
          fi
          if [ -z "${{ secrets.SUPABASE_PROJECT_REF }}" ]; then
            echo "::error::SUPABASE_PROJECT_REF is not set. Add your Supabase project Reference ID in repo Settings → Secrets and variables → Actions (Supabase Dashboard → Project Settings → General)."
            exit 1
          fi
          echo "Secrets are set."

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"

      - name: Push migrations
        run: supabase db push
